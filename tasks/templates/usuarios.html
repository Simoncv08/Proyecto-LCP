{% extends 'base.html' %}

{% block content %}
<h4>Usuarios Activos</h4>

<table class="table table-hover">
    <thead>
        <tr>
            <th>Usuario</th>
            <th>Email</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for u in usuarios %}
        <tr>
            <td>{{ u.username }}</td>
            <td>{{ u.email }}</td>
            <td>
                <a href="{% url 'editar_usuario' u.id %}" class="btn btn-sm btn-primary">Editar</a>
                <form method="POST" action="{% url 'eliminar_usuario' u.id %}" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-sm btn-danger"
                        onclick="return confirm('¿Seguro que deseas eliminar este usuario?')">
                        Eliminar
                    </button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
