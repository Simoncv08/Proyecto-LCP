{% extends 'base.html' %}

{% block content %}
<h4>Usuarios Activos</h4>

<table class="table table-hover">
    <thead>
        <tr>
            <th>Usuario</th>
            <th>Email</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for u in usuarios %}
        <tr>
            <td>{{ u.username }}</td>
            <td>{{ u.email }}</td>
            <td>
                <a href="{% url 'editar_usuario' u.id %}" class="btn btn-sm btn-primary">Editar</a>
                <a href="{% url 'eliminar_usuario' u.id %}" class="btn btn-sm btn-danger">Eliminar</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
